<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo FPS Básico</title>
    <style>
        body, html { margin: 0; overflow: hidden; height: 100%; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, cube;
        let clock = new THREE.Clock();
        let playerSpeed = 0.1;
        let cameraRotationSpeed = 0.01;

        // Função para iniciar o jogo
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Renderizador WebGL
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Criar um cubo como "alvo"
            let geometry = new THREE.BoxGeometry();
            let material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // Posicionar a câmera
            camera.position.z = 5;

            // Detectar movimento do mouse
            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('keydown', onKeyDown, false);
            document.addEventListener('keyup', onKeyUp, false);

            animate();
        }

        // Função de animação (loop)
        function animate() {
            requestAnimationFrame(animate);

            let delta = clock.getDelta(); // tempo entre frames

            // Atualizar a posição da câmera
            if (keyState["ArrowUp"]) {
                camera.position.z -= playerSpeed;
            }
            if (keyState["ArrowDown"]) {
                camera.position.z += playerSpeed;
            }
            if (keyState["ArrowLeft"]) {
                camera.rotation.y += cameraRotationSpeed;
            }
            if (keyState["ArrowRight"]) {
                camera.rotation.y -= cameraRotationSpeed;
            }

            // Atualiza a cena
            renderer.render(scene, camera);
        }

        // Movimentação do mouse (controle da direção da câmera)
        let mouseX = 0;
        let mouseY = 0;
        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            camera.rotation.x = mouseY * Math.PI;
            camera.rotation.y = mouseX * Math.PI;
        }

        // Controle de teclas pressionadas
        let keyState = {};
        function onKeyDown(event) {
            keyState[event.key] = true;
        }

        function onKeyUp(event) {
            keyState[event.key] = false;
        }

        // Inicializa o jogo
        init();
    </script>
</body>
</html>
