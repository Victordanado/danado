<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Treino de Mira</title>
    <style>
        body, html { margin: 0; overflow: hidden; height: 100%; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, targets = [];
        let clock = new THREE.Clock();
        let playerSpeed = 0.1;
        let cameraRotationSpeed = 0.005;
        let movementSmoothness = 0.05; // Ajuste para suavizar a câmera

        // Função para iniciar o jogo
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Renderizador WebGL
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Criar a pistola (uma geometria simples)
            let pistol = createPistol();
            scene.add(pistol);

            // Criar os alvos (bolinhas azuis)
            for (let i = 0; i < 5; i++) {
                let target = createTarget();
                scene.add(target);
                targets.push(target);
            }

            // Posicionar a câmera
            camera.position.z = 5;

            // Detectar movimento do mouse
            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('mousedown', onMouseDown, false);
            document.addEventListener('keydown', onKeyDown, false);
            document.addEventListener('keyup', onKeyUp, false);

            animate();
        }

        // Função para criar uma pistola simples (Glock 19)
        function createPistol() {
            let pistol = new THREE.Group();

            let bodyGeometry = new THREE.BoxGeometry(1, 0.3, 0.2);
            let bodyMaterial = new THREE.MeshBasicMaterial({ color: 0x333333 });
            let body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.set(0, -0.5, -1);
            pistol.add(body);

            let barrelGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.8);
            let barrelMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
            let barrel = new THREE.Mesh(barrelGeometry, barrelMaterial);
            barrel.position.set(0, 0, -1.5);
            barrel.rotation.x = Math.PI / 2;
            pistol.add(barrel);

            return pistol;
        }

        // Função para criar um alvo (bolinha azul)
        function createTarget() {
            let geometry = new THREE.SphereGeometry(0.5, 32, 32);
            let material = new THREE.MeshBasicMaterial({ color: 0x0000ff });
            let target = new THREE.Mesh(geometry, material);
            
            // Posicionamento aleatório do alvo na cena
            target.position.set(
                Math.random() * 10 - 5, 
                Math.random() * 10 - 5, 
                Math.random() * 10 - 5
            );
            target.isTarget = true; // Marca como alvo
            return target;
        }

        // Função de animação (loop)
        function animate() {
            requestAnimationFrame(animate);

            let delta = clock.getDelta(); // tempo entre frames

            // Atualiza a posição da câmera com suavização
            camera.position.x += (targetCameraPos.x - camera.position.x) * movementSmoothness;
            camera.position.y += (targetCameraPos.y - camera.position.y) * movementSmoothness;
            camera.position.z += (targetCameraPos.z - camera.position.z) * movementSmoothness;

            // Atualizar a rotação da câmera com suavização
            camera.rotation.x += (targetCameraRotation.x - camera.rotation.x) * movementSmoothness;
            camera.rotation.y += (targetCameraRotation.y - camera.rotation.y) * movementSmoothness;

            // Movimentar alvos
            targets.forEach(target => {
                target.position.x += (Math.random() - 0.5) * 0.1;
                target.position.y += (Math.random() - 0.5) * 0.1;
                target.position.z += (Math.random() - 0.5) * 0.1;
            });

            // Atualiza a cena
            renderer.render(scene, camera);
        }

        // Movimentação do mouse (controle da direção da câmera)
        let mouseX = 0;
        let mouseY = 0;
        let targetCameraPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
        let targetCameraRotation = { x: camera.rotation.x, y: camera.rotation.y };
        
        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            targetCameraRotation.x = mouseY * Math.PI;
            targetCameraRotation.y = -mouseX * Math.PI; // Inverte a rotação da câmera
        }

        // Detecta o clique com o botão direito do mouse para "atirar"
        function onMouseDown(event) {
            if (event.button === 2) { // Botão direito do mouse
                targets.forEach(target => {
                    if (isTargetInCrosshairs(target)) {
                        target.visible = false; // Remove o alvo
                    }
                });
            }
        }

        // Verifica se o alvo está no ponto de mira
        function isTargetInCrosshairs(target) {
            let targetPosition = target.position.clone().project(camera);
            return Math.abs(targetPosition.x) < 0.1 && Math.abs(targetPosition.y) < 0.1;
        }

        // Controle de teclas pressionadas
        let keyState = {};
        function onKeyDown(event) {
            keyState[event.key] = true;
        }

        function onKeyUp(event) {
            keyState[event.key] = false;
        }

        // Inicializa o jogo
        init();
    </script>
</body>
</html>
